modLoader = "javafml"
loaderVersion = "[4,)"
license = "LGPLv3"

# This is a URL to e.g. your GitHub or CurseForge issues page.
# It will appear in any crash reports this mod is directly involved in.
issueTrackerURL="https://github.com/baileyholl/ars-creo/issues" #optional
# A list of mods - how many allowed here is determined by the individual mod loader

[[mods]]
modId = "ars_creo"
# The version number of the mod - unlike in the Forge MDK,
# we'll use the processResources task to replace this for us
version="${file.jarVersion}"
displayName = "Ars Creo"
# This will be displayed as your mod's logo in the Mods panel.
# logoFile="icon.png" #optional
# Some more fluff displayed in the Mods panel. Feel free to issue your special thanks here!
# credits="" #optional
# Some more fluff displayed in the Mods panel. Plug your stuff here!
authors="Bailey" #optional
# A multi-line description for your mod. This has no minimum length, but it *is* required!
description = '''A create addon for Ars Nouveau'''

#[[mixins]]
#config="ars_creo.mixins.json"

[[dependencies.ars_creo]]
modId="neoforge"
type="required"
versionRange="[21,)"
ordering="NONE"
side="BOTH"

# Here's another dependency
[[dependencies.ars_creo]]
modId="minecraft"
type="required"
versionRange="[1.20.6,1.21.2)"
ordering="NONE"
side="BOTH"

[[dependencies.ars_creo]]
modId="ars_nouveau"
mandatory=true
versionRange="[5.0.0,)"
ordering="AFTER"
side="BOTH"
[[dependencies.ars_creo]]
modId="create"
mandatory=true
versionRange="[0.5.1,)"
ordering="AFTER"